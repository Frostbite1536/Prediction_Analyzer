services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./data/prediction_analyzer.db
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  mcp:
    build:
      context: .
      target: mcp
    ports:
      - "8001:8001"
    env_file: .env
    restart: unless-stopped

volumes:
  app-data:
